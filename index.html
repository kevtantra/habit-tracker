<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>popnoods — Space</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f9f7; color: #1a1a1a; min-height: 100vh; }
    input, textarea, button, select { font-family: inherit; }
    :root {
      --bg: #ffffff; --bg2: #f1f0e8; --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22); --text: #1a1a1a; --text2: #6b6b68;
      --radius: 8px; --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #f0f0ee; }
      :root {
        --bg: #252523; --bg2: #2e2e2b; --border: rgba(255,255,255,0.12);
        --border2: rgba(255,255,255,0.22); --text: #f0f0ee; --text2: #9a9a96;
      }
    }
    #topnav { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 1.25rem; display: flex; align-items: center; justify-content: space-between; height: 48px; }
    #topnav .brand { font-size: 14px; font-weight: 500; color: var(--text); text-decoration: none; }
    #topnav .navlinks { display: flex; gap: 4px; }
    #topnav .navlinks a { font-size: 13px; color: var(--text2); text-decoration: none; padding: 5px 10px; border-radius: var(--radius); }
    #topnav .navlinks a:hover { background: var(--bg2); color: var(--text); }
    #topnav .navlinks a.active { color: var(--text); font-weight: 500; }
  </style>
</head>
<body>
  <nav id="topnav">
    <a class="brand" href="/">popnoods</a>
    <div class="navlinks">
      <a href="/" class="active">Space</a>
      <a href="/habits.html">Habits</a>
      <a href="/tasks.html">Tasks</a>
      <a href="/notes.html">Notes</a>
    </div>
  </nav>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const SUPABASE_URL = "https://tdobkblqcvpcgkpehare.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkb2JrYmxxY3ZwY2drcGVoYXJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MTM0MjksImV4cCI6MjA4OTk4OTQyOX0.wwysDOb3C3GXcNg6E6Vrh1BgTJXR_A5CaX_S7Quouks";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const GREETINGS = [
      "Welcome to White Space. You have been living here for as long as you can remember.",
      "Welcome to White Space. It is a beautiful day outside.",
      "Welcome to White Space. Something feels different today.",
      "Welcome to White Space. Everything is in its right place.",
      "Welcome to White Space. The day is waiting for you.",
    ];

    function getTodayStr() { return new Date().toISOString().slice(0,10); }

    function useNow() {
      const [now, setNow] = useState(new Date());
      useEffect(() => { const t = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(t); }, []);
      return now;
    }

    function taskUrgencyColor(task) {
      if (task.done) return task.color;
      if (!task.due_date) return task.color;
      const today = getTodayStr();
      if (task.due_date < today) return "#E24B4A";
      if (task.due_date === today) return "#BA7517";
      return task.color;
    }

    function formatDueDate(str) {
      if (!str) return null;
      const today = getTodayStr();
      if (str === today) return "Due today";
      if (str < today) return "Overdue";
      const d = new Date(str + "T00:00:00");
      return "Due " + d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }

    // — Auth —
    function Auth() {
      const [email, setEmail] = useState(""); const [pw, setPw] = useState("");
      const [mode, setMode] = useState("login"); const [msg, setMsg] = useState("");
      const [loading, setLoading] = useState(false);
      async function handleSubmit() {
        setLoading(true); setMsg("");
        if (mode === "login") { const { error } = await sb.auth.signInWithPassword({ email, password: pw }); if (error) setMsg(error.message); }
        else { const { error } = await sb.auth.signUp({ email, password: pw }); if (error) setMsg(error.message); else setMsg("Check your email to confirm."); }
        setLoading(false);
      }
      async function handleGoogle() { await sb.auth.signInWithOAuth({ provider: "google", options: { redirectTo: window.location.href } }); }
      const s = {
        wrap: { minHeight: "80vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 },
        card: { background: "var(--bg)", border: "0.5px solid var(--border)", borderRadius: "var(--radius-lg)", padding: "2rem", width: "100%", maxWidth: 360 },
        input: { width: "100%", fontSize: 14, padding: "9px 12px", borderRadius: "var(--radius)", border: "0.5px solid var(--border2)", background: "var(--bg)", color: "var(--text)", marginBottom: 12, outline: "none" },
        btn: (p) => ({ width: "100%", fontSize: 14, padding: 10, borderRadius: "var(--radius)", border: p ? "none" : "0.5px solid var(--border2)", background: p ? "#1D9E75" : "transparent", color: p ? "white" : "var(--text)", cursor: "pointer", fontWeight: 500, marginBottom: 10 }),
      };
      return (
        <div style={s.wrap}>
          <div style={s.card}>
            <p style={{ fontSize: 20, fontWeight: 500, marginBottom: 6 }}>popnoods</p>
            <p style={{ fontSize: 13, color: "var(--text2)", marginBottom: 24 }}>{mode === "login" ? "Sign in" : "Create account"}</p>
            <input style={s.input} type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="Email" />
            <input style={s.input} type="password" value={pw} onChange={e => setPw(e.target.value)} placeholder="Password" onKeyDown={e => e.key === "Enter" && handleSubmit()} />
            <button style={s.btn(true)} onClick={handleSubmit} disabled={loading}>{loading ? "..." : mode === "login" ? "Sign in" : "Sign up"}</button>
            <button style={s.btn(false)} onClick={handleGoogle}>Continue with Google</button>
            {msg && <p style={{ fontSize: 13, color: "#D85A30", marginTop: 8 }}>{msg}</p>}
            <p style={{ fontSize: 13, color: "var(--text2)", textAlign: "center", marginTop: 12, cursor: "pointer" }} onClick={() => { setMode(mode === "login" ? "signup" : "login"); setMsg(""); }}>
              {mode === "login" ? "No account? Sign up" : "Have an account? Sign in"}
            </p>
          </div>
        </div>
      );
    }

    // — Main —
    function App() {
      const [session, setSession] = useState(null);
      const [habits, setHabits] = useState([]);
      const [habitLogs, setHabitLogs] = useState([]);
      const [tasks, setTasks] = useState([]);
      const [pinnedNotes, setPinnedNotes] = useState([]);
      const [recentNotes, setRecentNotes] = useState([]);
      const [loading, setLoading] = useState(true);
      const [greeting] = useState(GREETINGS[Math.floor(Math.random() * GREETINGS.length)]);
      const now = useNow();

      // task form
      const [showTaskForm, setShowTaskForm] = useState(false);
      const [taskTitle, setTaskTitle] = useState("");
      const [taskDue, setTaskDue] = useState("");
      const [taskColor, setTaskColor] = useState("#378ADD");

      useEffect(() => {
        sb.auth.getSession().then(({ data: { session } }) => { setSession(session); if (session) loadData(session.user.id); else setLoading(false); });
        const { data: { subscription } } = sb.auth.onAuthStateChange((_, session) => { setSession(session); if (session) loadData(session.user.id); else setLoading(false); });
        return () => subscription.unsubscribe();
      }, []);

      async function loadData(uid) {
        setLoading(true);
        const [{ data: hData }, { data: lData }, { data: tData }, { data: nData }] = await Promise.all([
          sb.from("habits").select("*").eq("user_id", uid),
          sb.from("habit_logs").select("*").eq("user_id", uid),
          sb.from("tasks").select("*").eq("user_id", uid).eq("done", false).order("due_date", { ascending: true }),
          sb.from("notes").select("*").eq("user_id", uid).order("created_at", { ascending: false }).limit(20),
        ]);
        setHabits(hData || []);
        setHabitLogs(lData || []);
        setTasks(tData || []);
        setPinnedNotes((nData || []).filter(n => n.pinned));
        setRecentNotes((nData || []).filter(n => !n.pinned).slice(0, 4));
        setLoading(false);
      }

      async function addTask() {
        if (!taskTitle.trim()) return;
        const { data, error } = await sb.from("tasks").insert({ user_id: session.user.id, title: taskTitle.trim(), due_date: taskDue || null, color: taskColor, done: false }).select().single();
        if (!error) { setTasks([...tasks, data].sort((a,b) => (a.due_date||"9999") > (b.due_date||"9999") ? 1 : -1)); setTaskTitle(""); setTaskDue(""); setTaskColor("#378ADD"); setShowTaskForm(false); }
      }

      async function completeTask(id) {
        await sb.from("tasks").update({ done: true }).eq("id", id);
        setTasks(tasks.filter(t => t.id !== id));
      }

      async function unpinNote(note) {
        const { data } = await sb.from("notes").update({ pinned: false }).eq("id", note.id).select().single();
        if (data) { setPinnedNotes(pinnedNotes.filter(n => n.id !== note.id)); setRecentNotes([data, ...recentNotes].slice(0, 4)); }
      }

      const today = getTodayStr();
      const loggedToday = new Set(habitLogs.filter(l => l.date === today).map(l => l.habit_id));
      const dateStr = now.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
      const timeStr = now.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", second: "2-digit" });

      const s = {
        wrap: { color: "var(--text)", padding: "1.5rem 1rem", maxWidth: 680, margin: "0 auto" },
        card: { background: "var(--bg)", border: "0.5px solid var(--border)", borderRadius: "var(--radius-lg)", padding: "1rem 1.25rem", marginBottom: "0.75rem" },
        sectionLabel: { fontSize: 12, fontWeight: 500, color: "var(--text2)", textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 10 },
        btn: (a) => ({ fontSize: 13, padding: "6px 12px", borderRadius: "var(--radius)", border: "0.5px solid var(--border2)", background: a ? "var(--bg2)" : "transparent", color: "var(--text)", cursor: "pointer", fontWeight: 500 }),
        xBtn: { background: "none", border: "none", cursor: "pointer", color: "var(--text2)", fontSize: 18, padding: "0 2px", lineHeight: 1 },
        grid2: { display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: "0.75rem", marginBottom: "0.75rem" },
      };

      if (loading) return <div style={{ ...s.wrap, paddingTop: "3rem", textAlign: "center", color: "var(--text2)" }}>Loading...</div>;
      if (!session) return <Auth />;

      return (
        <div style={s.wrap}>

          {/* Greeting */}
          <div style={{ marginBottom: "2rem" }}>
            <p style={{ fontSize: 13, color: "var(--text2)", marginBottom: 6 }}>{dateStr} · {timeStr}</p>
            <p style={{ fontSize: 18, fontWeight: 400, lineHeight: 1.5, color: "var(--text)", fontStyle: "italic" }}>{greeting}</p>
          </div>

          {/* Top row — Habits + Tasks */}
          <div style={s.grid2}>

            {/* Habits */}
            <div style={s.card}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <span style={s.sectionLabel}>Habits</span>
                <a href="/habits.html" style={{ fontSize: 12, color: "var(--text2)", textDecoration: "none" }}>View all →</a>
              </div>
              {habits.length === 0 && <p style={{ fontSize: 13, color: "var(--text2)" }}>No habits yet.</p>}
              {habits.map(h => {
                const done = loggedToday.has(h.id);
                return (
                  <a key={h.id} href="/habits.html" style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: "0.5px solid var(--border)", textDecoration: "none", color: "var(--text)" }}>
                    <div style={{ width: 10, height: 10, borderRadius: "50%", background: h.color, flexShrink: 0 }} />
                    <span style={{ fontSize: 14, flex: 1 }}>{h.name}</span>
                    <span style={{ fontSize: 13, color: done ? "#1D9E75" : "var(--text2)", fontWeight: done ? 500 : 400 }}>{done ? "✓ Done" : "○ Pending"}</span>
                  </a>
                );
              })}
              <p style={{ fontSize: 12, color: "var(--text2)", marginTop: 10 }}>{loggedToday.size}/{habits.length} done today</p>
            </div>

            {/* Tasks */}
            <div style={s.card}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <span style={s.sectionLabel}>Tasks</span>
                <button style={s.btn(false)} onClick={() => setShowTaskForm(!showTaskForm)}>+ Add</button>
              </div>

              {showTaskForm && (
                <div style={{ marginBottom: 12, padding: "10px 12px", background: "var(--bg2)", borderRadius: "var(--radius)" }}>
                  <input type="text" placeholder="Task title..." value={taskTitle} onChange={e => setTaskTitle(e.target.value)} onKeyDown={e => e.key === "Enter" && addTask()} style={{ width: "100%", fontSize: 13, padding: "7px 10px", borderRadius: "var(--radius)", border: "0.5px solid var(--border2)", background: "var(--bg)", color: "var(--text)", outline: "none", marginBottom: 8 }} />
                  <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 8 }}>
                    <input type="date" value={taskDue} onChange={e => setTaskDue(e.target.value)} style={{ fontSize: 13, padding: "6px 8px", borderRadius: "var(--radius)", border: "0.5px solid var(--border2)", background: "var(--bg)", color: "var(--text)", outline: "none", flex: 1 }} />
                    <input type="color" value={taskColor} onChange={e => setTaskColor(e.target.value)} style={{ width: 32, height: 32, borderRadius: "var(--radius)", border: "0.5px solid var(--border2)", cursor: "pointer", padding: 2, background: "none" }} />
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button style={{ ...s.btn(true), background: "#1D9E75", color: "white", border: "none", fontSize: 13 }} onClick={addTask}>Save</button>
                    <button style={s.btn(false)} onClick={() => setShowTaskForm(false)}>Cancel</button>
                  </div>
                </div>
              )}

              {tasks.length === 0 && !showTaskForm && <p style={{ fontSize: 13, color: "var(--text2)" }}>No tasks. You're clear.</p>}
              {tasks.map(t => {
                const urgColor = taskUrgencyColor(t);
                const dueLabel = formatDueDate(t.due_date);
                return (
                  <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: "0.5px solid var(--border)" }}>
                    <div style={{ width: 10, height: 10, borderRadius: "50%", background: urgColor, flexShrink: 0 }} />
                    <span style={{ fontSize: 14, flex: 1, color: "var(--text)" }}>{t.title}</span>
                    {dueLabel && <span style={{ fontSize: 11, color: urgColor, fontWeight: 500, whiteSpace: "nowrap" }}>{dueLabel}</span>}
                    <button onClick={() => completeTask(t.id)} style={{ background: "none", border: `1.5px solid ${urgColor}`, borderRadius: "50%", width: 20, height: 20, cursor: "pointer", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }} title="Mark done">
                      <svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5" fill="none" stroke={urgColor} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    </button>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Sticky notes */}
          {pinnedNotes.length > 0 && (
            <div style={s.card}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <span style={s.sectionLabel}>📌 Pinned</span>
                <a href="/notes.html" style={{ fontSize: 12, color: "var(--text2)", textDecoration: "none" }}>View all →</a>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 10 }}>
                {pinnedNotes.map(note => (
                  <div key={note.id} style={{ background: "var(--bg2)", borderRadius: "var(--radius)", padding: "10px 12px", position: "relative" }}>
                    <button style={{ ...s.xBtn, position: "absolute", top: 6, right: 6, fontSize: 14 }} onClick={() => unpinNote(note)} title="Unpin">×</button>
                    <p style={{ fontSize: 13, lineHeight: 1.6, color: "var(--text)", whiteSpace: "pre-wrap", paddingRight: 16 }}>{note.content.slice(0, 120)}{note.content.length > 120 ? "..." : ""}</p>
                    <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginTop: 8 }}>
                      {(note.tags || []).map(t => <span key={t} style={{ fontSize: 10, padding: "2px 6px", borderRadius: 999, background: "var(--bg)", color: "var(--text2)" }}>{t}</span>)}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Recent notes */}
          <div style={s.card}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <span style={s.sectionLabel}>Recent notes</span>
              <a href="/notes.html" style={{ fontSize: 12, color: "var(--text2)", textDecoration: "none" }}>View all →</a>
            </div>
            {recentNotes.length === 0 && <p style={{ fontSize: 13, color: "var(--text2)" }}>No notes yet.</p>}
            {recentNotes.map(note => (
              <div key={note.id} style={{ padding: "8px 0", borderBottom: "0.5px solid var(--border)" }}>
                <p style={{ fontSize: 13, color: "var(--text)", whiteSpace: "pre-wrap", lineHeight: 1.5 }}>{note.content.slice(0, 100)}{note.content.length > 100 ? "..." : ""}</p>
                <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 4 }}>
                  {(note.tags || []).map(t => <span key={t} style={{ fontSize: 10, padding: "2px 6px", borderRadius: 999, background: "var(--bg2)", color: "var(--text2)" }}>{t}</span>)}
                  <span style={{ fontSize: 11, color: "var(--text2)", marginLeft: "auto" }}>{new Date(note.created_at).toLocaleDateString("en-US", { month: "short", day: "numeric" })}</span>
                </div>
              </div>
            ))}
          </div>

          {/* Sign out */}
          <div style={{ textAlign: "right", marginTop: "1rem" }}>
            <button style={s.btn(false)} onClick={() => sb.auth.signOut()}>Sign out</button>
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
