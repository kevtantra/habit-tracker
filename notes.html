<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes — popnoods</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f9f7; color: #1a1a1a; min-height: 100vh; }
    input, textarea, button, select { font-family: inherit; }
    :root {
      --bg: #ffffff; --bg2: #f1f0e8; --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22); --text: #1a1a1a; --text2: #6b6b68;
      --radius: 8px; --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #f0f0ee; }
      :root {
        --bg: #252523; --bg2: #2e2e2b; --border: rgba(255,255,255,0.12);
        --border2: rgba(255,255,255,0.22); --text: #f0f0ee; --text2: #9a9a96;
      }
    }
    #topnav { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 1.25rem; display: flex; align-items: center; justify-content: space-between; height: 48px; }
    #topnav .brand { font-size: 14px; font-weight: 500; color: var(--text); text-decoration: none; }
    #topnav .navlinks { display: flex; gap: 4px; }
    #topnav .navlinks a { font-size: 13px; color: var(--text2); text-decoration: none; padding: 5px 10px; border-radius: var(--radius); }
    #topnav .navlinks a:hover { background: var(--bg2); color: var(--text); }
    #topnav .navlinks a.active { color: var(--text); font-weight: 500; }
    .note-content h1 { font-size: 17px; font-weight: 500; margin: 0 0 6px; }
    .note-content h2 { font-size: 15px; font-weight: 500; margin: 0 0 4px; }
    .note-content ul { padding-left: 18px; margin: 4px 0; }
    .note-content li { font-size: 14px; line-height: 1.6; color: var(--text2); }
    .note-content p { font-size: 14px; line-height: 1.6; color: var(--text2); margin: 0; }
  </style>
</head>
<body>
  <nav id="topnav">
    <a class="brand" href="/">popnoods</a>
    <div class="navlinks">
      <a href="/habits.html">Habits</a>
      <a href="/notes.html" class="active">Notes</a>
    </div>
  </nav>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const SUPABASE_URL = "https://tdobkblqcvpcgkpehare.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkb2JrYmxxY3ZwY2drcGVoYXJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MTM0MjksImV4cCI6MjA4OTk4OTQyOX0.wwysDOb3C3GXcNg6E6Vrh1BgTJXR_A5CaX_S7Quouks";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const FIXED_TAGS = ["Personal", "Work", "Ideas", "Later"];

    function formatDate(str) {
      return new Date(str).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }

    function renderContent(text) {
      const lines = text.split("\n");
      const elements = [];
      let bulletBuffer = [];
      function flushBullets() {
        if (bulletBuffer.length) {
          elements.push(<ul key={elements.length}>{bulletBuffer.map((b,i) => <li key={i}>{b}</li>)}</ul>);
          bulletBuffer = [];
        }
      }
      lines.forEach((line, i) => {
        if (line.startsWith("# ")) { flushBullets(); elements.push(<h1 key={i}>{line.slice(2)}</h1>); }
        else if (line.startsWith("## ")) { flushBullets(); elements.push(<h2 key={i}>{line.slice(3)}</h2>); }
        else if (line.startsWith("- ") || line.startsWith("• ")) { bulletBuffer.push(line.slice(2)); }
        else { flushBullets(); if (line.trim()) elements.push(<p key={i}>{line}</p>); }
      });
      flushBullets();
      return elements;
    }

    // — Auth —
    function Auth() {
      const [email, setEmail] = useState(""); const [pw, setPw] = useState("");
      const [mode, setMode] = useState("login"); const [msg, setMsg] = useState("");
      const [loading, setLoading] = useState(false);
      async function handleSubmit() {
        setLoading(true); setMsg("");
        if (mode === "login") { const { error } = await sb.auth.signInWithPassword({ email, password: pw }); if (error) setMsg(error.message); }
        else { const { error } = await sb.auth.signUp({ email, password: pw }); if (error) setMsg(error.message); else setMsg("Check your email to confirm."); }
        setLoading(false);
      }
      async function handleGoogle() { await sb.auth.signInWithOAuth({ provider: "google", options: { redirectTo: window.location.href } }); }
      const s = {
        wrap: { minHeight: "80vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 },
        card: { background: "var(--bg)", border: "0.5px solid var(--border)", borderRadius: "var(--radius-lg)", padding: "2rem", width: "100%", maxWidth: 360 },
        input: { width: "100%", fontSize: 14, padding: "9px 12px", borderRadius: "var(--radius)", border: "0.5px solid var(--border2)", background: "var(--bg)", color: "var(--text)", marginBottom: 12, outline: "none" },
        btn: (p) => ({ width: "100%", fontSize: 14, padding: 10, borderRadius: "var(--radius)", border: p ? "none" : "0.5px solid var(--border2)", background: p ? "#1D9E75" : "transparent", color: p ? "white" : "var(--text)", cursor: "pointer", fontWeight: 500, marginBottom: 10 }),
      };
      return (
        <div style={s.wrap}>
          <div style={s.card}>
            <p style={{ fontSize: 20, fontWeight: 500, marginBottom: 6 }}>popnoods</p>
            <p style={{ fontSize: 13, color: "var(--text2)", marginBottom: 24 }}>{mode === "login" ? "Sign in" : "Create account"}</p>
            <input style={s.input} type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="Email" />
            <input style={s.input} type="password" value={pw} onChange={e => setPw(e.target.value)} placeholder="Password" onKeyDown={e => e.key === "Enter" && handleSubmit()} />
            <button style={s.btn(true)} onClick={handleSubmit} disabled={loading}>{loading ? "..." : mode === "login" ? "Sign in" : "Sign up"}</button>
            <button style={s.btn(false)} onClick={handleGoogle}>Continue with Google</button>
            {msg && <p style={{ fontSize: 13, color: "#D85A30", marginTop: 8 }}>{msg}</p>}
            <p style={{ fontSize: 13, color: "var(--text2)", textAlign: "center", marginTop: 12, cursor: "pointer" }} onClick={() => { setMode(mode === "login" ? "signup" : "login"); setMsg(""); }}>
              {mode === "login" ? "No account? Sign up" : "Have an account? Sign in"}
            </p>
          </div>
        </div>
      );
    }

    // — Main —
    function App() {
      const [session, setSession] = useState(null);
      const [notes, setNotes] = useState([]);
      const [habits, setHabits] = useState([]);
      const [loading, setLoading] = useState(true);
      const [filterTag, setFilterTag] = useState("All");
      const [editing, setEditing] = useState(null); // null | "new" | note object
      const [content, setContent] = useState("");
      const [selectedTags, setSelectedTags] = useState([]);
      const [selectedHabit, setSelectedHabit] = useState("");
      const [preview, setPreview] = useState(false);
      const textareaRef = useRef();

      useEffect(() => {
        sb.auth.getSession().then(({ data: { session } }) => { setSession(session); if (session) loadData(session.user.id); else setLoading(false); });
        const { data: { subscription } } = sb.auth.onAuthStateChange((_, session) => { setSession(session); if (session) loadData(session.user.id); else setLoading(false); });
        return () => subscription.unsubscribe();
      }, []);

      async function loadData(uid) {
        setLoading(true);
        const [{ data: nData }, { data: hData }] = await Promise.all([
          sb.from("notes").select("*").eq("user_id", uid).order("created_at", { ascending: false }),
          sb.from("habits").select("*").eq("user_id", uid),
        ]);
        setNotes(nData || []);
        setHabits(hData || []);
        setLoading(false);
      }

      function openNew() { setEditing("new"); setContent(""); setSelectedTags([]); setSelectedHabit(""); setPreview(false); }
      function openEdit(note) { setEditing(note); setContent(note.content); setSelectedTags(note.tags || []); setSelectedHabit(note.habit_id || ""); setPreview(false); }
      function closeEditor() { setEditing(null); }

      function toggleTag(tag) {
        setSelectedTags(prev => prev.includes(tag) ? prev.filter(t => t !== tag) : [...prev, tag]);
      }

      async function saveNote() {
        if (!content.trim()) return;
        const habitObj = habits.find(h => h.id === selectedHabit);
        const allTags = habitObj ? [...new Set([...selectedTags, habitObj.name])] : selectedTags;
        if (editing === "new") {
          const { data, error } = await sb.from("notes").insert({ user_id: session.user.id, content: content.trim(), tags: allTags, habit_id: selectedHabit || null, pinned: false }).select().single();
          if (!error) { setNotes([data, ...notes]); closeEditor(); }
        } else {
          const { data, error } = await sb.from("notes").update({ content: content.trim(), tags: allTags, habit_id: selectedHabit || null, updated_at: new Date().toISOString() }).eq("id", editing.id).select().single();
          if (!error) { setNotes(notes.map(n => n.id === editing.id ? data : n)); closeEditor(); }
        }
      }

      async function deleteNote(id) {
        await sb.from("notes").delete().eq("id", id);
        setNotes(notes.filter(n => n.id !== id));
        if (editing && editing.id === id) closeEditor();
      }

      async function togglePin(note) {
        const { data } = await sb.from("notes").update({ pinned: !note.pinned }).eq("id", note.id).select().single();
        if (data) setNotes(notes.map(n => n.id === note.id ? data : n));
      }

      const allTags = ["All", ...FIXED_TAGS, ...habits.map(h => h.name)];
      const filtered = filterTag === "All" ? notes : notes.filter(n => (n.tags || []).includes(filterTag));
      const pinned = filtered.filter(n => n.pinned);
      const unpinned = filtered.filter(n => !n.pinned);

      const s = {
        wrap: { color: "var(--text)", padding: "1.5rem 1rem", maxWidth: 640, margin: "0 auto" },
        row: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "1.25rem" },
        title: { fontSize: 20, fontWeight: 500 },
        btn: (a) => ({ fontSize: 13, padding: "7px 14px", borderRadius: "var(--radius)", border: "0.5px solid var(--border2)", background: a ? "var(--bg2)" : "transparent", color: "var(--text)", cursor: "pointer", fontWeight: 500 }),
        tagPill: (a) => ({ fontSize: 12, padding: "4px 10px", borderRadius: 999, border: `0.5px solid ${a ? "var(--border2)" : "var(--border)"}`, background: a ? "var(--bg2)" : "transparent", color: a ? "var(--text)" : "var(--text2)", cursor: "pointer", whiteSpace: "nowrap" }),
        card: { background: "var(--bg)", border: "0.5px solid var(--border)", borderRadius: "var(--radius-lg)", padding: "1rem 1.25rem", marginBottom: "0.75rem" },
        noteTag: (color) => ({ fontSize: 11, padding: "2px 8px", borderRadius: 999, background: color || "var(--bg2)", color: color ? "white" : "var(--text2)", display: "inline-block" }),
        textarea: { width: "100%", fontSize: 14, lineHeight: 1.7, padding: "10px 12px", borderRadius: "var(--radius)", border: "0.5px solid var(--border2)", background: "var(--bg)", color: "var(--text)", resize: "vertical", minHeight: 160, outline: "none", fontFamily: "inherit" },
        xBtn: { background: "none", border: "none", cursor: "pointer", color: "var(--text2)", fontSize: 18, padding: "0 2px", lineHeight: 1 },
        sectionLabel: { fontSize: 12, fontWeight: 500, color: "var(--text2)", textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 10 },
      };

      const habitColorMap = {};
      habits.forEach(h => { habitColorMap[h.name] = h.color; });

      if (loading) return <div style={{ ...s.wrap, paddingTop: "3rem", textAlign: "center", color: "var(--text2)" }}>Loading...</div>;
      if (!session) return <Auth />;

      return (
        <div style={s.wrap}>
          <div style={s.row}>
            <div>
              <p style={s.title}>Notes</p>
              <p style={{ fontSize: 13, color: "var(--text2)", marginTop: 3 }}>{notes.length} note{notes.length !== 1 ? "s" : ""}</p>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button style={s.btn(true)} onClick={openNew}>+ New note</button>
              <button style={s.btn(false)} onClick={() => sb.auth.signOut()}>Sign out</button>
            </div>
          </div>

          {/* Filter tags */}
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: "1.25rem" }}>
            {allTags.map(t => (
              <button key={t} style={s.tagPill(filterTag === t)} onClick={() => setFilterTag(t)}>{t}</button>
            ))}
          </div>

          {/* Editor */}
          {editing !== null && (
            <div style={{ ...s.card, marginBottom: "1.5rem", border: "0.5px solid var(--border2)" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <span style={{ fontSize: 13, fontWeight: 500 }}>{editing === "new" ? "New note" : "Edit note"}</span>
                <div style={{ display: "flex", gap: 8 }}>
                  <button style={s.btn(preview)} onClick={() => setPreview(!preview)}>{preview ? "Edit" : "Preview"}</button>
                  <button style={s.xBtn} onClick={closeEditor}>×</button>
                </div>
              </div>

              {preview ? (
                <div className="note-content" style={{ minHeight: 120, padding: "10px 12px", background: "var(--bg2)", borderRadius: "var(--radius)", marginBottom: 12 }}>
                  {content.trim() ? renderContent(content) : <p style={{ color: "var(--text2)" }}>Nothing to preview yet.</p>}
                </div>
              ) : (
                <textarea
                  ref={textareaRef}
                  autoFocus
                  style={s.textarea}
                  placeholder={"# Heading\n## Subheading\n- Bullet point\n\nOr just write freely..."}
                  value={content}
                  onChange={e => setContent(e.target.value)}
                />
              )}

              <div style={{ fontSize: 12, color: "var(--text2)", marginBottom: 8 }}>Tags</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
                {FIXED_TAGS.map(t => (
                  <button key={t} style={s.tagPill(selectedTags.includes(t))} onClick={() => toggleTag(t)}>{t}</button>
                ))}
              </div>

              <div style={{ fontSize: 12, color: "var(--text2)", marginBottom: 8 }}>Link to habit (optional)</div>
              <select value={selectedHabit} onChange={e => setSelectedHabit(e.target.value)} style={{ fontSize: 13, padding: "7px 10px", borderRadius: "var(--radius)", border: "0.5px solid var(--border2)", background: "var(--bg)", color: "var(--text)", marginBottom: 14, outline: "none" }}>
                <option value="">None</option>
                {habits.map(h => <option key={h.id} value={h.id}>{h.name}</option>)}
              </select>

              <div style={{ display: "flex", gap: 8 }}>
                <button style={{ ...s.btn(true), background: "#1D9E75", color: "white", border: "none" }} onClick={saveNote}>Save</button>
                {editing !== "new" && <button style={{ ...s.btn(false), color: "#E24B4A", borderColor: "#E24B4A" }} onClick={() => deleteNote(editing.id)}>Delete</button>}
              </div>
            </div>
          )}

          {/* Pinned */}
          {pinned.length > 0 && (
            <>
              <div style={s.sectionLabel}>📌 Pinned</div>
              {pinned.map(note => <NoteCard key={note.id} note={note} onEdit={openEdit} onPin={togglePin} habitColorMap={habitColorMap} s={s} renderContent={renderContent} />)}
              <div style={{ marginBottom: "1.25rem" }} />
            </>
          )}

          {/* All notes */}
          {unpinned.length === 0 && pinned.length === 0 && (
            <div style={{ fontSize: 14, color: "var(--text2)" }}>No notes yet. Hit "+ New note" to capture something.</div>
          )}
          {unpinned.map(note => <NoteCard key={note.id} note={note} onEdit={openEdit} onPin={togglePin} habitColorMap={habitColorMap} s={s} renderContent={renderContent} />)}
        </div>
      );
    }

    function NoteCard({ note, onEdit, onPin, habitColorMap, s, renderContent }) {
      const preview = note.content.slice(0, 200);
      return (
        <div style={{ ...s.card, cursor: "pointer" }} onClick={() => onEdit(note)}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
            <div className="note-content" style={{ flex: 1, marginRight: 8 }}>{renderContent(preview)}</div>
            <button style={{ ...s.xBtn, fontSize: 16, opacity: note.pinned ? 1 : 0.4 }} onClick={e => { e.stopPropagation(); onPin(note); }} title={note.pinned ? "Unpin" : "Pin"}>📌</button>
          </div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center", marginTop: 8 }}>
            {(note.tags || []).map(t => (
              <span key={t} style={{ fontSize: 11, padding: "2px 8px", borderRadius: 999, background: habitColorMap[t] || "var(--bg2)", color: habitColorMap[t] ? "white" : "var(--text2)" }}>{t}</span>
            ))}
            <span style={{ fontSize: 11, color: "var(--text2)", marginLeft: "auto" }}>{formatDate(note.created_at)}</span>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
