<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Reflect — popnoods</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f9f7; color: #1a1a1a; min-height: 100vh; }
    input, textarea, button, select { font-family: inherit; }
    :root { --bg: #ffffff; --bg2: #f1f0e8; --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22); --text: #1a1a1a; --text2: #6b6b68; --radius: 8px; --radius-lg: 12px; --bottom-nav-h: 60px; }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #f0f0ee; }
      :root { --bg: #252523; --bg2: #2e2e2b; --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22); --text: #f0f0ee; --text2: #9a9a96; }
    }
    #topnav { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 1.25rem; display: flex; align-items: center; justify-content: space-between; height: 48px; }
    #topnav .brand { font-size: 14px; font-weight: 500; color: var(--text); text-decoration: none; }
    #topnav .navlinks { display: flex; gap: 4px; }
    #topnav .navlinks a { font-size: 13px; color: var(--text2); text-decoration: none; padding: 5px 10px; border-radius: var(--radius); }
    #topnav .navlinks a.active { color: var(--text); font-weight: 500; }
    #bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: var(--bg); border-top: 0.5px solid var(--border); height: var(--bottom-nav-h); }
    #bottom-nav a { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-decoration: none; color: var(--text2); font-size: 10px; gap: 3px; padding: 8px 0; -webkit-tap-highlight-color: transparent; }
    #bottom-nav a.active { color: var(--text); }
    #bottom-nav a svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    @media (max-width: 640px) { #topnav { display: none; } #bottom-nav { display: flex; } body { padding-bottom: var(--bottom-nav-h); } }
  </style>
</head>
<body>
  <nav id="topnav">
    <a class="brand" href="/">popnoods</a>
    <div class="navlinks">
      <a href="/">Space</a>
      <a href="/habits.html">Habits</a>
      <a href="/tasks.html">Tasks</a>
      <a href="/notes.html">Notes</a>
      <a href="/reflect.html" class="active">Reflect</a>
    </div>
  </nav>
  <nav id="bottom-nav">
    <a href="/"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Space</a>
    <a href="/habits.html"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Habits</a>
    <a href="/tasks.html"><svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Tasks</a>
    <a href="/notes.html"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Notes</a>
  </nav>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const SUPABASE_URL = "https://tdobkblqcvpcgkpehare.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkb2JrYmxxY3ZwY2drcGVoYXJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MTM0MjksImV4cCI6MjA4OTk4OTQyOX0.wwysDOb3C3GXcNg6E6Vrh1BgTJXR_A5CaX_S7Quouks";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    function getTodayStr() { return new Date().toISOString().slice(0,10); }
    function getWeekStart() { const d=new Date(); d.setDate(d.getDate()-d.getDay()); return d.toISOString().slice(0,10); }
    function getMonthStart() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01`; }
    function formatDate(str) { return new Date(str+"T00:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}); }

    function Auth() {
      const [email,setEmail]=useState(""); const [pw,setPw]=useState("");
      const [mode,setMode]=useState("login"); const [msg,setMsg]=useState(""); const [loading,setLoading]=useState(false);
      async function submit() {
        setLoading(true); setMsg("");
        if(mode==="login"){const{error}=await sb.auth.signInWithPassword({email,password:pw});if(error)setMsg(error.message);}
        else{const{error}=await sb.auth.signUp({email,password:pw});if(error)setMsg(error.message);else setMsg("Check your email.");}
        setLoading(false);
      }
      const si={width:"100%",fontSize:14,padding:"9px 12px",borderRadius:"var(--radius)",border:"0.5px solid var(--border2)",background:"var(--bg)",color:"var(--text)",marginBottom:12,outline:"none"};
      const sb2=(p)=>({width:"100%",fontSize:14,padding:10,borderRadius:"var(--radius)",border:p?"none":"0.5px solid var(--border2)",background:p?"#1D9E75":"transparent",color:p?"white":"var(--text)",cursor:"pointer",fontWeight:500,marginBottom:10});
      return (
        <div style={{minHeight:"80vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"var(--bg)",border:"0.5px solid var(--border)",borderRadius:"var(--radius-lg)",padding:"2rem",width:"100%",maxWidth:360}}>
            <p style={{fontSize:20,fontWeight:500,marginBottom:6}}>popnoods</p>
            <p style={{fontSize:13,color:"var(--text2)",marginBottom:24}}>{mode==="login"?"Sign in":"Create account"}</p>
            <input style={si} type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email"/>
            <input style={si} type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Password" onKeyDown={e=>e.key==="Enter"&&submit()}/>
            <button style={sb2(true)} onClick={submit} disabled={loading}>{loading?"...":mode==="login"?"Sign in":"Sign up"}</button>
            <button style={sb2(false)} onClick={()=>sb.auth.signInWithOAuth({provider:"google",options:{redirectTo:window.location.href}})}>Continue with Google</button>
            {msg&&<p style={{fontSize:13,color:"#D85A30",marginTop:8}}>{msg}</p>}
            <p style={{fontSize:13,color:"var(--text2)",textAlign:"center",marginTop:12,cursor:"pointer"}} onClick={()=>{setMode(mode==="login"?"signup":"login");setMsg("");}}>
              {mode==="login"?"No account? Sign up":"Have an account? Sign in"}
            </p>
          </div>
        </div>
      );
    }

    function Bar({pct, color}) {
      return (
        <div style={{height:8,borderRadius:4,background:"var(--bg2)",overflow:"hidden",marginTop:4}}>
          <div style={{width:`${Math.min(100,pct)}%`,height:"100%",background:color||"#1D9E75",borderRadius:4,transition:"width 0.5s"}}/>
        </div>
      );
    }

    function App() {
      const [session,setSession]=useState(null);
      const [habits,setHabits]=useState([]);
      const [habitLogs,setHabitLogs]=useState({});
      const [tasks,setTasks]=useState([]);
      const [notes,setNotes]=useState([]);
      const [loading,setLoading]=useState(true);
      const [tab,setTab]=useState("week");

      useEffect(()=>{
        sb.auth.getSession().then(({data:{session}})=>{setSession(session);if(session)loadData(session.user.id);else setLoading(false);});
        const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{setSession(session);if(session)loadData(session.user.id);else setLoading(false);});
        return()=>subscription.unsubscribe();
      },[]);

      async function loadData(uid) {
        setLoading(true);
        const[{data:hData},{data:lData},{data:tData},{data:nData}]=await Promise.all([
          sb.from("habits").select("*").eq("user_id",uid),
          sb.from("habit_logs").select("*").eq("user_id",uid),
          sb.from("tasks").select("*").eq("user_id",uid),
          sb.from("notes").select("*").eq("user_id",uid).order("created_at",{ascending:false}),
        ]);
        const habitsArr=hData||[];
        const logsMap={};
        habitsArr.forEach(h=>{logsMap[h.id]=(lData||[]).filter(l=>l.habit_id===h.id);});
        setHabits(habitsArr);
        setHabitLogs(logsMap);
        setTasks(tData||[]);
        setNotes(nData||[]);
        setLoading(false);
      }

      const today=getTodayStr();
      const weekStart=getWeekStart();
      const monthStart=getMonthStart();
      function inRange(date,from){return date>=from&&date<=today;}

      const allLogs=Object.values(habitLogs).flat();

      // Day
      const dayHabits=habits.map(h=>({...h,done:(habitLogs[h.id]||[]).some(l=>l.date===today),mins:(habitLogs[h.id]||[]).filter(l=>l.date===today).reduce((s,l)=>s+l.minutes,0),sessions:(habitLogs[h.id]||[]).filter(l=>l.date===today)}));
      const tasksDoneToday=tasks.filter(t=>t.done&&t.updated_at?.slice(0,10)===today).length;
      const tasksPending=tasks.filter(t=>!t.done).length;
      const notesToday=notes.filter(n=>n.created_at?.slice(0,10)===today);

      // Week
      const weekHabits=habits.map(h=>{
        const wlogs=(habitLogs[h.id]||[]).filter(l=>inRange(l.date,weekStart));
        const days=new Set(wlogs.map(l=>l.date));
        const mins=wlogs.reduce((s,l)=>s+l.minutes,0);
        return{...h,count:days.size,mins,sessions:wlogs};
      });
      const daysInWeekSoFar=Math.min(7,Math.floor((new Date(today+"T00:00:00")-new Date(weekStart+"T00:00:00"))/86400000)+1);
      const weekLogs=allLogs.filter(l=>inRange(l.date,weekStart));
      const tasksCreatedWeek=tasks.filter(t=>inRange(t.created_at?.slice(0,10),weekStart)).length;
      const tasksDoneWeek=tasks.filter(t=>t.done&&inRange(t.updated_at?.slice(0,10),weekStart)).length;
      const notesWeek=notes.filter(n=>inRange(n.created_at?.slice(0,10),weekStart));
      // best streak day this week
      const dayCounts={};
      weekLogs.forEach(l=>{dayCounts[l.date]=(dayCounts[l.date]||0)+1;});
      const bestDay=Object.entries(dayCounts).sort((a,b)=>b[1]-a[1])[0];

      // Month
      const monthHabits=habits.map(h=>{
        const mlogs=(habitLogs[h.id]||[]).filter(l=>inRange(l.date,monthStart));
        const days=new Set(mlogs.map(l=>l.date));
        const mins=mlogs.reduce((s,l)=>s+l.minutes,0);
        return{...h,count:days.size,mins};
      });
      const daysInMonthSoFar=new Date().getDate();
      const monthLogs=allLogs.filter(l=>inRange(l.date,monthStart));
      const tasksCreatedMonth=tasks.filter(t=>inRange(t.created_at?.slice(0,10),monthStart)).length;
      const tasksDoneMonth=tasks.filter(t=>t.done&&inRange(t.updated_at?.slice(0,10),monthStart)).length;
      const notesMonth=notes.filter(n=>inRange(n.created_at?.slice(0,10),monthStart));
      const totalStudyMins=monthLogs.reduce((s,l)=>s+l.minutes,0);
      // most active week of month
      const weekCounts={};
      monthLogs.forEach(l=>{const w=new Date(l.date+"T00:00:00");w.setDate(w.getDate()-w.getDay());const ws=w.toISOString().slice(0,10);weekCounts[ws]=(weekCounts[ws]||0)+1;});
      const mostActiveWeek=Object.entries(weekCounts).sort((a,b)=>b[1]-a[1])[0];

      const weekEnd = today;
      const weekStartDisplay = new Date(weekStart+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
      const weekEndDisplay = new Date(weekEnd+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
      const monthStartDisplay = new Date(monthStart+"T00:00:00").toLocaleDateString("en-US",{month:"long"});
        wrap:{color:"var(--text)",padding:"1.5rem 1rem",maxWidth:580,margin:"0 auto"},
        card:{background:"var(--bg)",border:"0.5px solid var(--border)",borderRadius:"var(--radius-lg)",padding:"1rem 1.25rem",marginBottom:"0.75rem"},
        label:{fontSize:12,fontWeight:500,color:"var(--text2)",textTransform:"uppercase",letterSpacing:"0.04em",marginBottom:10},
        tab:(a)=>({fontSize:13,padding:"6px 14px",borderRadius:999,border:`0.5px solid ${a?"var(--border2)":"var(--border)"}`,background:a?"var(--bg2)":"transparent",color:a?"var(--text)":"var(--text2)",cursor:"pointer",fontWeight:a?500:400}),
        stat:{background:"var(--bg2)",borderRadius:"var(--radius)",padding:"10px 12px",flex:1,minWidth:80},
        row:{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"},
        sectionDivider:{fontSize:11,fontWeight:500,color:"var(--text2)",textTransform:"uppercase",letterSpacing:"0.04em",margin:"16px 0 8px",paddingBottom:4,borderBottom:"0.5px solid var(--border)"},
        habitRow:{marginBottom:12},
        sessionNote:{fontSize:12,color:"var(--text2)",padding:"4px 8px",background:"var(--bg2)",borderRadius:"var(--radius)",marginTop:4},
        noteCard:{padding:"8px 0",borderBottom:"0.5px solid var(--border)"},
      };

      if(loading)return<div style={{...s.wrap,paddingTop:"3rem",textAlign:"center",color:"var(--text2)"}}>Loading...</div>;
      if(!session)return<Auth/>;

      const today2=new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

      return (
        <div style={s.wrap}>
          <div style={{marginBottom:"1.5rem"}}>
            <p style={{fontSize:20,fontWeight:500}}>Reflect</p>
            <p style={{fontSize:13,color:"var(--text2)",marginTop:3}}>{today2}</p>
          </div>

          <div style={{display:"flex",gap:8,marginBottom:"1.25rem"}}>
            {["day","week","month"].map(v=>(
              <button key={v} style={s.tab(tab===v)} onClick={()=>setTab(v)}>{v==="day"?"Today":v==="week"?"This week":"This month"}</button>
            ))}
          </div>

          {/* DAY */}
          {tab==="day"&&(
            <>
              <div style={s.card}>
                <div style={s.label}>Overview — {weekStartDisplay} to {weekEndDisplay} ({daysInWeekSoFar} of 7 days)</div>
                  <div style={s.stat}><div style={{fontSize:11,color:"var(--text2)",marginBottom:2}}>Habits</div><div style={{fontSize:22,fontWeight:500}}>{dayHabits.filter(h=>h.done).length}/{habits.length}</div></div>
                  <div style={s.stat}><div style={{fontSize:11,color:"var(--text2)",marginBottom:2}}>Tasks done</div><div style={{fontSize:22,fontWeight:500}}>{tasksDoneToday}</div></div>
                  <div style={s.stat}><div style={{fontSize:11,color:"var(--text2)",marginBottom:2}}>Notes</div><div style={{fontSize:22,fontWeight:500}}>{notesToday.length}</div></div>
                  <div style={s.stat}><div style={{fontSize:11,color:"var(--text2)",marginBottom:2}}>Pending</div><div style={{fontSize:22,fontWeight:500}}>{tasksPending}</div></div>
                </div>
              </div>

              <div style={s.card}>
                <div style={s.label}>Habits</div>
                {dayHabits.map(h=>(
                  <div key={h.id} style={{marginBottom:12}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:10,height:10,borderRadius:"50%",background:h.color}}/>
                        <span style={{fontSize:14,fontWeight:500}}>{h.name}</span>
                      </div>
                      <span style={{fontSize:13,color:h.done?"#1D9E75":"var(--text2)",fontWeight:h.done?500:400}}>{h.done?`✓ ${h.mins} min`:"Not logged"}</span>
                    </div>
                    {h.sessions.filter(e=>e.notes).map((e,i)=>(
                      <div key={i} style={{fontSize:12,color:"var(--text2)",padding:"4px 8px",background:"var(--bg2)",borderRadius:"var(--radius)",marginTop:4}}>{e.notes}</div>
                    ))}
                  </div>
                ))}
              </div>

              {notesToday.length>0&&(
                <div style={s.card}>
                  <div style={s.label}>Notes today</div>
                  {notesToday.map(n=>(
                    <div key={n.id} style={s.noteCard}>
                      <p style={{fontSize:13,lineHeight:1.6,color:"var(--text)",whiteSpace:"pre-wrap"}}>{n.content}</p>
                      <div style={{display:"flex",gap:4,marginTop:4}}>{(n.tags||[]).map(t=><span key={t} style={{fontSize:10,padding:"1px 6px",borderRadius:999,background:"var(--bg2)",color:"var(--text2)"}}>{t}</span>)}</div>
                    </div>
                  ))}
                </div>
              )}
            </>
          )}

          {/* WEEK */}
          {tab==="week"&&(
            <>
              <div style={s.card}>
                <div style={s.label}>Overview</div>
                <div style={s.row}>
                  <div style={s.stat}><div style={{fontSize:11,color:"var(--text2)",marginBottom:2}}>Tasks in</div><div style={{fontSize:22,fontWeight:500}}>{tasksCreatedWeek}</div></div>
                  <div style={s.stat}><div style={{fontSize:11,color:"var(--text2)",marginBottom:2}}>Tasks done</div><div style={{fontSize:22,fontWeight:500}}>{tasksDoneWeek}</div></div>
                  <div style={s.stat}><div style={{fontSize:11,color:"var(--text2)",marginBottom:2}}>Notes</div><div style={{fontSize:22,fontWeight:500}}>{notesWeek.length}</div></div>
                </div>
                {bestDay&&<p style={{fontSize:12,color:"var(--text2)"}}>Most active day: {formatDate(bestDay[0])} ({bestDay[1]} session{bestDay[1]!==1?"s":""})</p>}
              </div>

              <div style={s.card}>
                <div style={s.label}>Habit consistency</div>
                {weekHabits.map(h=>(
                  <div key={h.id} style={{marginBottom:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:10,height:10,borderRadius:"50%",background:h.color}}/>
                        <span style={{fontSize:14}}>{h.name}</span>
                      </div>
                      <span style={{fontSize:12,color:"var(--text2)"}}>{h.count}/{daysInWeekSoFar} days · {h.mins} min</span>
                    </div>
                    <Bar pct={(h.count/daysInWeekSoFar)*100} color={h.color}/>
                  </div>
                ))}
              </div>

              {notesWeek.length>0&&(
                <div style={s.card}>
                  <div style={s.label}>Notes this week</div>
                  {notesWeek.slice(0,5).map(n=>(
                    <div key={n.id} style={s.noteCard}>
                      <p style={{fontSize:13,lineHeight:1.5,color:"var(--text)"}}>{n.content.slice(0,120)}{n.content.length>120?"...":""}</p>
                      <div style={{display:"flex",gap:4,alignItems:"center",marginTop:4}}>
                        {(n.tags||[]).map(t=><span key={t} style={{fontSize:10,padding:"1px 6px",borderRadius:999,background:"var(--bg2)",color:"var(--text2)"}}>{t}</span>)}
                        <span style={{fontSize:11,color:"var(--text2)",marginLeft:"auto"}}>{formatDate(n.created_at?.slice(0,10))}</span>
                      </div>
                    </div>
                  ))}
                  {notesWeek.length>5&&<p style={{fontSize:12,color:"var(--text2)",marginTop:8}}>+{notesWeek.length-5} more in Notes</p>}
                </div>
              )}
            </>
          )}

          {/* MONTH */}
          {tab==="month"&&(
            <>
                  <div style={s.stat}><div style={{fontSize:11,color:"var(--text2)",marginBottom:2}}>Sessions</div><div style={{fontSize:22,fontWeight:500}}>{weekLogs.length}</div></div><div style={{fontSize:22,fontWeight:500}}>{totalStudyMins}</div></div>
                  <div style={s.stat}><div style={{fontSize:11,color:"var(--text2)",marginBottom:2}}>Tasks in</div><div style={{fontSize:22,fontWeight:500}}>{tasksCreatedMonth}</div></div>
                  <div style={s.stat}><div style={{fontSize:11,color:"var(--text2)",marginBottom:2}}>Tasks done</div><div style={{fontSize:22,fontWeight:500}}>{tasksDoneMonth}</div></div>
                  <div style={s.stat}><div style={{fontSize:11,color:"var(--text2)",marginBottom:2}}>Notes</div><div style={{fontSize:22,fontWeight:500}}>{notesMonth.length}</div></div>
                </div>
                {mostActiveWeek&&<p style={{fontSize:12,color:"var(--text2)"}}>Most active week: {formatDate(mostActiveWeek[0])} ({mostActiveWeek[1]} session{mostActiveWeek[1]!==1?"s":""})</p>}
              </div>

              <div style={s.card}>
                <div style={s.label}>Habit consistency</div>
                {monthHabits.map(h=>(
                  <div key={h.id} style={{marginBottom:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:10,height:10,borderRadius:"50%",background:h.color}}/>
                        <span style={{fontSize:14}}>{h.name}</span>
                      </div>
                      <span style={{fontSize:12,color:"var(--text2)"}}>{h.count}/{daysInMonthSoFar} days · {h.mins} min</span>
                    </div>
                    <Bar pct={(h.count/daysInMonthSoFar)*100} color={h.color}/>
                  </div>
                ))}
              </div>

              {notesMonth.length>0&&(
                <div style={s.card}>
                  <div style={s.label}>Notes this month</div>
                  {notesMonth.slice(0,5).map(n=>(
                    <div key={n.id} style={s.noteCard}>
                      <p style={{fontSize:13,lineHeight:1.5,color:"var(--text)"}}>{n.content.slice(0,120)}{n.content.length>120?"...":""}</p>
                      <div style={{display:"flex",gap:4,alignItems:"center",marginTop:4}}>
                        {(n.tags||[]).map(t=><span key={t} style={{fontSize:10,padding:"1px 6px",borderRadius:999,background:"var(--bg2)",color:"var(--text2)"}}>{t}</span>)}
                        <span style={{fontSize:11,color:"var(--text2)",marginLeft:"auto"}}>{formatDate(n.created_at?.slice(0,10))}</span>
                      </div>
                    </div>
                  ))}
                  {notesMonth.length>5&&<p style={{fontSize:12,color:"var(--text2)",marginTop:8}}>+{notesMonth.length-5} more in Notes</p>}
                </div>
              )}
            </>
          )}

          <div style={{textAlign:"right",marginTop:"1rem"}}>
            <button style={{fontSize:13,padding:"6px 12px",borderRadius:"var(--radius)",border:"0.5px solid var(--border2)",background:"transparent",color:"var(--text)",cursor:"pointer"}} onClick={()=>sb.auth.signOut()}>Sign out</button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
