<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f9f7; color: #1a1a1a; min-height: 100vh; }
    input, textarea, button { font-family: inherit; }
    #topnav { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 1.25rem; display: flex; align-items: center; justify-content: space-between; height: 48px; }
    #topnav .brand { font-size: 14px; font-weight: 500; color: var(--text); text-decoration: none; }
    #topnav .navlinks { display: flex; gap: 4px; }
    #topnav .navlinks a { font-size: 13px; color: var(--text2); text-decoration: none; padding: 5px 10px; border-radius: var(--radius); }
    #topnav .navlinks a:hover { background: var(--bg2); color: var(--text); }
    #topnav .navlinks a.active { color: var(--text); font-weight: 500; }
    :root {
      --bg: #ffffff; --bg2: #f1f0e8; --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22); --text: #1a1a1a; --text2: #6b6b68;
      --radius: 8px; --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #f0f0ee; }
      :root {
        --bg: #252523; --bg2: #2e2e2b; --border: rgba(255,255,255,0.12);
        --border2: rgba(255,255,255,0.22); --text: #f0f0ee; --text2: #9a9a96;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <nav id="topnav">
    <a class="brand" href="/">popnoods</a>
    <div class="navlinks">
      <a href="/habits.html" class="active">Habits</a>
      <a href="/notes.html">Notes</a>
    </div>
  </nav>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const SUPABASE_URL = "https://tdobkblqcvpcgkpehare.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkb2JrYmxxY3ZwY2drcGVoYXJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MTM0MjksImV4cCI6MjA4OTk4OTQyOX0.wwysDOb3C3GXcNg6E6Vrh1BgTJXR_A5CaX_S7Quouks";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const COLORS = ["#1D9E75","#378ADD","#D85A30","#D4537E","#7F77DD","#BA7517","#639922","#E24B4A"];

    function getTodayStr() { return new Date().toISOString().slice(0,10); }
    function formatDate(str) {
      return new Date(str+"T00:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
    }
    function calcStreaks(logs) {
      if (!logs.length) return { current: 0, longest: 0 };
      const dates = [...new Set(logs.map(l => l.date))].sort();
      let streak = 1, longest = 1;
      for (let i = 1; i < dates.length; i++) {
        const diff = (new Date(dates[i]+"T00:00:00") - new Date(dates[i-1]+"T00:00:00")) / 86400000;
        streak = diff === 1 ? streak + 1 : 1;
        if (streak > longest) longest = streak;
      }
      const gap = (new Date(getTodayStr()+"T00:00:00") - new Date(dates[dates.length-1]+"T00:00:00")) / 86400000;
      return { current: gap <= 1 ? streak : 0, longest };
    }

    // — Auth —
    function Auth() {
      const [email, setEmail] = useState(""); const [pw, setPw] = useState("");
      const [mode, setMode] = useState("login"); const [msg, setMsg] = useState("");
      const [loading, setLoading] = useState(false);

      async function handleSubmit() {
        setLoading(true); setMsg("");
        if (mode === "login") {
          const { error } = await sb.auth.signInWithPassword({ email, password: pw });
          if (error) setMsg(error.message);
        } else {
          const { error } = await sb.auth.signUp({ email, password: pw });
          if (error) setMsg(error.message);
          else setMsg("Check your email to confirm your account.");
        }
        setLoading(false);
      }

      async function handleGoogle() {
        await sb.auth.signInWithOAuth({ provider: "google", options: { redirectTo: window.location.href } });
      }

      const s = {
        wrap: { minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 },
        card: { background: "var(--bg)", border: "0.5px solid var(--border)", borderRadius: "var(--radius-lg)", padding: "2rem", width: "100%", maxWidth: 360 },
        title: { fontSize: 20, fontWeight: 500, marginBottom: 6 },
        sub: { fontSize: 13, color: "var(--text2)", marginBottom: 24 },
        label: { fontSize: 12, color: "var(--text2)", marginBottom: 4, display: "block" },
        input: { width: "100%", fontSize: 14, padding: "9px 12px", borderRadius: "var(--radius)", border: "0.5px solid var(--border2)", background: "var(--bg)", color: "var(--text)", marginBottom: 12, outline: "none" },
        btn: (primary) => ({ width: "100%", fontSize: 14, padding: "10px", borderRadius: "var(--radius)", border: primary ? "none" : "0.5px solid var(--border2)", background: primary ? "#1D9E75" : "transparent", color: primary ? "white" : "var(--text)", cursor: "pointer", fontWeight: 500, marginBottom: 10 }),
        msg: { fontSize: 13, color: "#D85A30", marginTop: 8 },
        toggle: { fontSize: 13, color: "var(--text2)", textAlign: "center", marginTop: 12, cursor: "pointer" },
      };

      return (
        <div style={s.wrap}>
          <div style={s.card}>
            <p style={s.title}>Habit Tracker</p>
            <p style={s.sub}>{mode === "login" ? "Sign in to your account" : "Create a new account"}</p>
            <label style={s.label}>Email</label>
            <input style={s.input} type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@email.com" />
            <label style={s.label}>Password</label>
            <input style={s.input} type="password" value={pw} onChange={e => setPw(e.target.value)} placeholder="••••••••" onKeyDown={e => e.key === "Enter" && handleSubmit()} />
            <button style={s.btn(true)} onClick={handleSubmit} disabled={loading}>{loading ? "..." : mode === "login" ? "Sign in" : "Sign up"}</button>
            <button style={s.btn(false)} onClick={handleGoogle}>Continue with Google</button>
            {msg && <p style={s.msg}>{msg}</p>}
            <p style={s.toggle} onClick={() => { setMode(mode === "login" ? "signup" : "login"); setMsg(""); }}>
              {mode === "login" ? "No account? Sign up" : "Have an account? Sign in"}
            </p>
          </div>
        </div>
      );
    }

    // — Overview calendar —
    function OverviewCalendar({ habits, logs }) {
      const today = getTodayStr();
      const todayD = new Date(today+"T00:00:00");
      const [refDate, setRefDate] = useState(new Date(today+"T00:00:00"));
      const year = refDate.getFullYear(), month = refDate.getMonth();
      const monthName = refDate.toLocaleDateString("en-US",{month:"long",year:"numeric"});
      const firstDay = new Date(year,month,1).getDay();
      const daysInMonth = new Date(year,month+1,0).getDate();
      const isMinMonth = year === todayD.getFullYear() && month === todayD.getMonth();
      const isMaxMonth = year === todayD.getFullYear() && month === 11;
      const habitLogSets = habits.map(h => ({ color: h.color, set: new Set((logs[h.id]||[]).map(l=>l.date)) }));
      const cells = [];
      for (let i = 0; i < firstDay; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) {
        const str = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        cells.push({ d, str, doneDots: habitLogSets.filter(h=>h.set.has(str)).map(h=>h.color), isToday: str===today });
      }
      const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      const s = {
        card: { background:"var(--bg)", border:"0.5px solid var(--border)", borderRadius:"var(--radius-lg)", padding:"1rem 1.25rem", marginBottom:"0.75rem" },
      };
      return (
        <div style={s.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{fontSize:12,fontWeight:500,color:"var(--text2)",textTransform:"uppercase",letterSpacing:"0.04em"}}>Overview</span>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <button onClick={()=>{if(!isMinMonth)setRefDate(new Date(year,month-1,1))}} style={{background:"none",border:"none",cursor:isMinMonth?"default":"pointer",color:isMinMonth?"var(--border2)":"var(--text2)",fontSize:18,padding:"0 4px",lineHeight:1}}>‹</button>
              <span style={{fontSize:13,fontWeight:500,minWidth:120,textAlign:"center"}}>{monthName}</span>
              <button onClick={()=>{if(!isMaxMonth)setRefDate(new Date(year,month+1,1))}} style={{background:"none",border:"none",cursor:isMaxMonth?"default":"pointer",color:isMaxMonth?"var(--border2)":"var(--text2)",fontSize:18,padding:"0 4px",lineHeight:1}}>›</button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,minmax(0,1fr))",gap:4}}>
            {days.map(d=><div key={d} style={{fontSize:11,color:"var(--text2)",textAlign:"center",paddingBottom:4}}>{d}</div>)}
            {cells.map((c,i)=>c===null?<div key={"e"+i}/>:(
              <div key={c.str} style={{borderRadius:"var(--radius)",border:c.isToday?"1.5px solid var(--border2)":"0.5px solid var(--border)",padding:"4px 2px 5px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,minHeight:40}}>
                <span style={{fontSize:11,fontWeight:c.isToday?500:400,color:c.isToday?"var(--text)":"var(--text2)"}}>{c.d}</span>
                <div style={{display:"flex",flexWrap:"wrap",gap:2,justifyContent:"center"}}>
                  {c.doneDots.map((color,j)=><div key={j} style={{width:6,height:6,borderRadius:"50%",background:color}}/>)}
                </div>
              </div>
            ))}
          </div>
          {habits.length>0&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:10,marginTop:12}}>
              {habits.map(h=>(
                <div key={h.id} style={{display:"flex",alignItems:"center",gap:5}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:h.color}}/>
                  <span style={{fontSize:12,color:"var(--text2)"}}>{h.name}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // — Habit calendar —
    function CalendarView({ logs, color }) {
      const today = getTodayStr();
      const todayD = new Date(today+"T00:00:00");
      const [refDate, setRefDate] = useState(new Date(today+"T00:00:00"));
      const loggedSet = new Set(logs.map(l=>l.date));
      const year = refDate.getFullYear(), month = refDate.getMonth();
      const monthName = refDate.toLocaleDateString("en-US",{month:"long",year:"numeric"});
      const firstDay = new Date(year,month,1).getDay();
      const daysInMonth = new Date(year,month+1,0).getDate();
      const isMinMonth = year===todayD.getFullYear()&&month===todayD.getMonth();
      const isMaxMonth = year===todayD.getFullYear()&&month===11;
      const cells = [];
      for (let i=0;i<firstDay;i++) cells.push(null);
      for (let d=1;d<=daysInMonth;d++) {
        const str=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        cells.push({d,str,done:loggedSet.has(str),isToday:str===today});
      }
      const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      return (
        <div style={{marginBottom:"1.25rem"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{fontSize:12,fontWeight:500,color:"var(--text2)",textTransform:"uppercase",letterSpacing:"0.04em"}}>Activity — {loggedSet.size} day{loggedSet.size!==1?"s":""} logged</span>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <button onClick={()=>{if(!isMinMonth)setRefDate(new Date(year,month-1,1))}} style={{background:"none",border:"none",cursor:isMinMonth?"default":"pointer",color:isMinMonth?"var(--border2)":"var(--text2)",fontSize:18,padding:"0 4px",lineHeight:1}}>‹</button>
              <span style={{fontSize:13,fontWeight:500,minWidth:120,textAlign:"center"}}>{monthName}</span>
              <button onClick={()=>{if(!isMaxMonth)setRefDate(new Date(year,month+1,1))}} style={{background:"none",border:"none",cursor:isMaxMonth?"default":"pointer",color:isMaxMonth?"var(--border2)":"var(--text2)",fontSize:18,padding:"0 4px",lineHeight:1}}>›</button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,minmax(0,1fr))",gap:4}}>
            {days.map(d=><div key={d} style={{fontSize:11,color:"var(--text2)",textAlign:"center",paddingBottom:4}}>{d}</div>)}
            {cells.map((c,i)=>c===null?<div key={"e"+i}/>:(
              <div key={c.str} style={{borderRadius:"var(--radius)",border:c.isToday?`2px solid ${color}`:"0.5px solid var(--border)",background:c.done?color:"transparent",aspectRatio:"1",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{fontSize:12,fontWeight:c.isToday?500:400,color:c.done?"white":c.isToday?color:"var(--text2)"}}>{c.d}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // — Main app —
    function App() {
      const [session, setSession] = useState(null);
      const [habits, setHabits] = useState([]);
      const [logs, setLogs] = useState({});
      const [view, setView] = useState("overview");
      const [logView, setLogView] = useState("today");
      const [newHabit, setNewHabit] = useState("");
      const [adding, setAdding] = useState(false);
      const [minutes, setMinutes] = useState("");
      const [notes, setNotes] = useState("");
      const [saved, setSaved] = useState(false);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        sb.auth.getSession().then(({ data: { session } }) => { setSession(session); if(session) loadData(session.user.id); else setLoading(false); });
        const { data: { subscription } } = sb.auth.onAuthStateChange((_,session) => { setSession(session); if(session) loadData(session.user.id); else { setLoading(false); setHabits([]); setLogs({}); } });
        return () => subscription.unsubscribe();
      }, []);

      async function loadData(uid) {
        setLoading(true);
        const { data: hData } = await sb.from("habits").select("*").eq("user_id", uid).order("created_at");
        const { data: lData } = await sb.from("habit_logs").select("*").eq("user_id", uid);
        const habitsArr = hData || [];
        const logsMap = {};
        habitsArr.forEach(h => { logsMap[h.id] = (lData||[]).filter(l=>l.habit_id===h.id).map(l=>({...l, date: l.date})); });
        setHabits(habitsArr);
        setLogs(logsMap);
        setLoading(false);
      }

      async function addHabit() {
        const name = newHabit.trim(); if (!name) return;
        const color = COLORS[habits.length % COLORS.length];
        const { data, error } = await sb.from("habits").insert({ name, color, user_id: session.user.id }).select().single();
        if (!error) { setHabits([...habits, data]); setLogs({...logs, [data.id]: []}); }
        setNewHabit(""); setAdding(false);
      }

      async function deleteHabit(id) {
        await sb.from("habits").delete().eq("id", id);
        setHabits(habits.filter(h=>h.id!==id));
        const nl = {...logs}; delete nl[id]; setLogs(nl);
        setView("overview");
      }

      async function logSession(habitId) {
        if (!minutes && !notes) return;
        const entry = { habit_id: habitId, user_id: session.user.id, date: getTodayStr(), minutes: parseInt(minutes)||0, notes: notes.trim() };
        const { data, error } = await sb.from("habit_logs").insert(entry).select().single();
        if (!error) {
          setLogs({...logs, [habitId]: [...(logs[habitId]||[]), data]});
          setMinutes(""); setNotes(""); setSaved(true); setTimeout(()=>setSaved(false),2000);
        }
      }

      async function deleteEntry(habitId, id) {
        await sb.from("habit_logs").delete().eq("id", id);
        setLogs({...logs, [habitId]: (logs[habitId]||[]).filter(e=>e.id!==id)});
      }

      const today = getTodayStr();
      const activeHabit = habits.find(h=>h.id===view);
      const habitLogs = activeHabit ? (logs[activeHabit.id]||[]) : [];
      const todayLogs = habitLogs.filter(l=>l.date===today);
      const doneToday = todayLogs.length > 0;
      const totalMinsToday = todayLogs.reduce((s,l)=>s+l.minutes,0);
      const { current, longest } = activeHabit ? calcStreaks(habitLogs) : {current:0,longest:0};
      const totalDays = activeHabit ? new Set(habitLogs.map(l=>l.date)).size : 0;
      const totalMins = habitLogs.reduce((s,l)=>s+l.minutes,0);
      const recentDays = [...new Set(habitLogs.map(l=>l.date))].sort().reverse().slice(0,30);

      // habit notes
      const [habitNotes, setHabitNotes] = useState([]);
      const [noteContent, setNoteContent] = useState("");
      const [noteTags, setNoteTags] = useState([]);
      const [noteSaved, setNoteSaved] = useState(false);

      const FIXED_TAGS = ["Personal", "Work", "Ideas", "Later"];

      useEffect(() => {
        if (!activeHabit) return;
        sb.from("notes").select("*").eq("user_id", session.user.id).eq("habit_id", activeHabit.id).order("created_at", { ascending: false }).then(({ data }) => setHabitNotes(data || []));
      }, [view]);

      async function saveHabitNote() {
        if (!noteContent.trim()) return;
        const allTags = [...new Set([...noteTags, activeHabit.name])];
        const { data, error } = await sb.from("notes").insert({ user_id: session.user.id, content: noteContent.trim(), tags: allTags, habit_id: activeHabit.id, pinned: false }).select().single();
        if (!error) { setHabitNotes([data, ...habitNotes]); setNoteContent(""); setNoteTags([]); setNoteSaved(true); setTimeout(() => setNoteSaved(false), 2000); }
      }

      async function deleteHabitNote(id) {
        await sb.from("notes").delete().eq("id", id);
        setHabitNotes(habitNotes.filter(n => n.id !== id));
      }

      function toggleNoteTag(tag) {
        setNoteTags(prev => prev.includes(tag) ? prev.filter(t => t !== tag) : [...prev, tag]);
      }

      const s = {
        wrap: { fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif", color:"var(--text)", padding:"1.5rem 1rem", maxWidth:540, margin:"0 auto" },
        row: { display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"1.25rem" },
        title: { fontSize:20, fontWeight:500, margin:0 },
        sub: { fontSize:13, color:"var(--text2)", margin:"3px 0 0" },
        btn: (a) => ({ fontSize:13, padding:"7px 14px", borderRadius:"var(--radius)", border:"0.5px solid var(--border2)", background:a?"var(--bg2)":"transparent", color:"var(--text)", cursor:"pointer", fontWeight:500 }),
        ghostBtn: { background:"none", border:"none", cursor:"pointer", color:"var(--text2)", fontSize:13, padding:0 },
        card: { background:"var(--bg)", border:"0.5px solid var(--border)", borderRadius:"var(--radius-lg)", padding:"1rem 1.25rem", marginBottom:"0.75rem" },
        habitCard: { background:"var(--bg)", border:"0.5px solid var(--border)", borderRadius:"var(--radius-lg)", padding:"1rem 1.25rem", marginBottom:"0.75rem", cursor:"pointer", display:"flex", alignItems:"center", gap:14 },
        statsRow: { display:"grid", gridTemplateColumns:"repeat(4,minmax(0,1fr))", gap:10, marginBottom:"1.25rem" },
        statCard: { background:"var(--bg2)", borderRadius:"var(--radius)", padding:"10px 12px" },
        tabs: { display:"flex", gap:8, marginBottom:"1.25rem" },
        tab: (a) => ({ fontSize:13, padding:"6px 14px", borderRadius:"var(--radius)", border:`0.5px solid ${a?"var(--border2)":"var(--border)"}`, background:a?"var(--bg2)":"transparent", color:a?"var(--text)":"var(--text2)", cursor:"pointer", fontWeight:a?500:400 }),
        check: (done) => ({ width:22, height:22, borderRadius:"50%", border:`2px solid ${done?"#1D9E75":"var(--border2)"}`, background:done?"#1D9E75":"transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }),
        inputLabel: { fontSize:12, color:"var(--text2)", marginBottom:4 },
        input: { fontSize:14, padding:"8px 10px", borderRadius:"var(--radius)", border:"0.5px solid var(--border2)", background:"var(--bg)", color:"var(--text)", outline:"none" },
        textarea: { fontSize:14, padding:"8px 10px", borderRadius:"var(--radius)", border:"0.5px solid var(--border2)", background:"var(--bg)", color:"var(--text)", resize:"vertical", minHeight:70, outline:"none", fontFamily:"inherit", width:"100%" },
        entryChip: { background:"var(--bg2)", borderRadius:"var(--radius)", padding:"8px 12px", marginBottom:8, display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:8 },
        dayBlock: { background:"var(--bg)", border:"0.5px solid var(--border)", borderRadius:"var(--radius-lg)", padding:"10px 14px", marginBottom:8 },
        deleteBtn: { fontSize:12, color:"var(--text2)", background:"none", border:"0.5px solid var(--border)", borderRadius:"var(--radius)", padding:"5px 10px", cursor:"pointer" },
        xBtn: { background:"none", border:"none", cursor:"pointer", color:"var(--text2)", fontSize:18, lineHeight:1, padding:"0 2px", flexShrink:0 },
      };

      if (loading) return <div style={{...s.wrap,paddingTop:"3rem",textAlign:"center",color:"var(--text2)"}}>Loading...</div>;
      if (!session) return <Auth />;

      // Overview
      if (view === "overview") {
        const todayCount = habits.filter(h=>(logs[h.id]||[]).some(l=>l.date===today)).length;
        return (
          <div style={s.wrap}>
            <div style={s.row}>
              <div><p style={s.title}>My Habits</p><p style={s.sub}>{todayCount}/{habits.length} done today</p></div>
              <div style={{display:"flex",gap:8}}>
                <button style={s.btn(true)} onClick={()=>setAdding(true)}>+ Add habit</button>
                <button style={s.btn(false)} onClick={()=>sb.auth.signOut()}>Sign out</button>
              </div>
            </div>

            <OverviewCalendar habits={habits} logs={logs} />

            {habits.map(h=>{
              const hl=logs[h.id]||[]; const done=hl.some(l=>l.date===today);
              const {current}=calcStreaks(hl); const days=new Set(hl.map(l=>l.date)).size;
              return (
                <div key={h.id} style={s.habitCard} onClick={()=>{setView(h.id);setLogView("today");}}>
                  <div style={{width:14,height:14,borderRadius:"50%",background:h.color,flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:500}}>{h.name}</div>
                    <div style={{fontSize:12,color:"var(--text2)"}}>{days} days · {current}d streak</div>
                  </div>
                  <div style={{fontSize:18,color:done?"#1D9E75":"var(--border2)"}}>{done?"✓":"○"}</div>
                </div>
              );
            })}
            {habits.length===0&&<div style={{fontSize:14,color:"var(--text2)"}}>No habits yet. Add one to get started!</div>}
            {adding&&(
              <div style={s.card}>
                <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>New habit</div>
                <input autoFocus type="text" placeholder="e.g. Read, Exercise, Meditate..." value={newHabit} onChange={e=>setNewHabit(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addHabit();if(e.key==="Escape"){setAdding(false);setNewHabit("");}}} style={{...s.input,width:"100%",marginBottom:10}}/>
                <div style={{display:"flex",gap:8}}>
                  <button style={s.btn(true)} onClick={addHabit}>Add</button>
                  <button style={s.btn(false)} onClick={()=>{setAdding(false);setNewHabit("");}}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        );
      }

      // Detail
      return (
        <div style={s.wrap}>
          <div style={{...s.row,marginBottom:"1rem"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <button style={s.ghostBtn} onClick={()=>setView("overview")}>← Back</button>
              <div style={{width:14,height:14,borderRadius:"50%",background:activeHabit.color}}/>
              <p style={{...s.title,margin:0}}>{activeHabit.name}</p>
            </div>
            <button style={s.deleteBtn} onClick={()=>deleteHabit(activeHabit.id)}>Delete</button>
          </div>

          <div style={s.statsRow}>
            {[{label:"Current streak",val:`${current}d`},{label:"Longest streak",val:`${longest}d`},{label:"Days done",val:totalDays},{label:"Total mins",val:totalMins}].map(c=>(
              <div key={c.label} style={s.statCard}>
                <div style={{fontSize:11,color:"var(--text2)",marginBottom:4}}>{c.label}</div>
                <div style={{fontSize:20,fontWeight:500}}>{c.val}</div>
              </div>
            ))}
          </div>

          <CalendarView logs={habitLogs} color={activeHabit.color} />

          <div style={s.tabs}>
            {["today","history","notes"].map(v=>(
              <button key={v} style={s.tab(logView===v)} onClick={()=>setLogView(v)}>{v==="today"?"Today":v==="history"?"History":"Notes"}</button>
            ))}
          </div>

          {logView==="today"&&(
            <>
              <div style={s.card}>
                <div style={{fontSize:12,fontWeight:500,color:"var(--text2)",textTransform:"uppercase",letterSpacing:"0.04em",marginBottom:10}}>Today — {formatDate(today)}</div>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:doneToday?12:0}}>
                  <div style={s.check(doneToday)}>{doneToday&&<svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" fill="none" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}</div>
                  <span style={{fontSize:15,fontWeight:500}}>{doneToday?`Done! ${totalMinsToday} min logged`:"Not logged yet"}</span>
                </div>
                {todayLogs.map((e,i)=>(
                  <div key={i} style={s.entryChip}>
                    <div><div style={{fontSize:13,fontWeight:500}}>{e.minutes} min</div>{e.notes&&<div style={{fontSize:13,color:"var(--text2)",marginTop:2}}>{e.notes}</div>}</div>
                    <button style={s.xBtn} onClick={()=>deleteEntry(activeHabit.id,e.id)}>×</button>
                  </div>
                ))}
              </div>
              <div style={s.card}>
                <div style={{fontSize:12,fontWeight:500,color:"var(--text2)",textTransform:"uppercase",letterSpacing:"0.04em",marginBottom:12}}>Log a session</div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  <div><div style={s.inputLabel}>Minutes</div><input type="number" min="1" placeholder="e.g. 30" value={minutes} onChange={e=>setMinutes(e.target.value)} style={{...s.input,width:110}}/></div>
                  <div><div style={s.inputLabel}>Notes (optional)</div><textarea placeholder="What did you work on?" value={notes} onChange={e=>setNotes(e.target.value)} style={s.textarea}/></div>
                  <div style={{display:"flex",gap:12,alignItems:"center"}}>
                    <button style={{...s.btn(true),background:saved?"#1D9E75":"var(--bg2)",color:saved?"white":"var(--text)",border:`0.5px solid ${saved?"#1D9E75":"var(--border2)"}`,transition:"all 0.2s"}} onClick={()=>logSession(activeHabit.id)}>{saved?"✓ Done!":"Done"}</button>
                  </div>
                </div>
              </div>
            </>
          )}

          {logView==="notes"&&(
            <div>
              <div style={s.card}>
                <div style={{fontSize:12,fontWeight:500,color:"var(--text2)",textTransform:"uppercase",letterSpacing:"0.04em",marginBottom:12}}>Quick note</div>
                <textarea placeholder="Capture a thought about this habit..." value={noteContent} onChange={e=>setNoteContent(e.target.value)} style={{...s.textarea,marginBottom:10}}/>
                <div style={{fontSize:12,color:"var(--text2)",marginBottom:6}}>Tags</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
                  {FIXED_TAGS.map(t=>(
                    <button key={t} onClick={()=>toggleNoteTag(t)} style={{fontSize:12,padding:"4px 10px",borderRadius:999,border:`0.5px solid ${noteTags.includes(t)?"var(--border2)":"var(--border)"}`,background:noteTags.includes(t)?"var(--bg2)":"transparent",color:noteTags.includes(t)?"var(--text)":"var(--text2)",cursor:"pointer"}}>{t}</button>
                  ))}
                </div>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <button style={{...s.btn(true),background:noteSaved?"#1D9E75":"var(--bg2)",color:noteSaved?"white":"var(--text)",border:`0.5px solid ${noteSaved?"#1D9E75":"var(--border2)"}`,transition:"all 0.2s"}} onClick={saveHabitNote}>{noteSaved?"✓ Saved!":"Save note"}</button>
                </div>
              </div>
              {habitNotes.length===0&&<div style={{fontSize:14,color:"var(--text2)"}}>No notes yet for this habit.</div>}
              {habitNotes.map(note=>(
                <div key={note.id} style={s.card}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                    <p style={{fontSize:14,lineHeight:1.6,color:"var(--text2)",flex:1,whiteSpace:"pre-wrap"}}>{note.content}</p>
                    <button style={s.xBtn} onClick={()=>deleteHabitNote(note.id)}>×</button>
                  </div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",marginTop:8}}>
                    {(note.tags||[]).map(t=><span key={t} style={{fontSize:11,padding:"2px 8px",borderRadius:999,background:"var(--bg2)",color:"var(--text2)"}}>{t}</span>)}
                    <span style={{fontSize:11,color:"var(--text2)",marginLeft:"auto"}}>{new Date(note.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
            <div>
              {recentDays.length===0&&<div style={{fontSize:14,color:"var(--text2)"}}>No sessions yet.</div>}
              {recentDays.map(date=>{
                const dl=habitLogs.filter(l=>l.date===date);
                const mins=dl.reduce((s,l)=>s+l.minutes,0);
                return (
                  <div key={date} style={s.dayBlock}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:dl.some(e=>e.notes)?6:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:8,height:8,borderRadius:"50%",background:activeHabit.color}}/>
                        <span style={{fontSize:13,fontWeight:500}}>{formatDate(date)}</span>
                      </div>
                      <span style={{fontSize:12,color:"var(--text2)"}}>{mins} min</span>
                    </div>
                    {dl.map((e,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8,marginTop:4}}>
                        <div>{e.notes&&<div style={{fontSize:13,color:"var(--text2)"}}>{e.notes}</div>}</div>
                        <button style={s.xBtn} onClick={()=>deleteEntry(activeHabit.id,e.id)}>×</button>
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
